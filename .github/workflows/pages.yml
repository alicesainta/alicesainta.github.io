name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject Cloudflare Web Analytics token
        env:
          CF_WEB_ANALYTICS_TOKEN: ${{ secrets.CF_WEB_ANALYTICS_TOKEN }}
        run: |
          if [ -z "$CF_WEB_ANALYTICS_TOKEN" ]; then
            echo "CF_WEB_ANALYTICS_TOKEN is not set. Skip analytics token injection."
            exit 0
          fi
          escaped_token=$(printf '%s\n' "$CF_WEB_ANALYTICS_TOKEN" | sed 's/[\/&]/\\&/g')
          sed -i "s/CF_WEB_ANALYTICS_TOKEN_PLACEHOLDER/$escaped_token/g" _config.reimu.yml

      - name: Validate and generate static files
        run: pnpm run check

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
